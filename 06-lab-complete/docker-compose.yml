services:
  agent:
    build: .
    environment:
      - PORT=8000
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=${AGENT_API_KEY:-secret}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-10}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD:-10}
      - ESTIMATED_COST_PER_REQUEST_USD=${ESTIMATED_COST_PER_REQUEST_USD:-0.01}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT:-18080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
