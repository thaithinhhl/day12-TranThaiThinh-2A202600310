services:
  - type: web
    name: production-ai-agent
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        sync: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10"
      - key: CONVERSATION_MAX_TURNS
        value: "20"
      - key: ESTIMATED_COST_PER_REQUEST_USD
        value: "0.01"
      - key: LLM_MODEL
        value: mock-llm-v1
      - key: ENVIRONMENT
        value: production
